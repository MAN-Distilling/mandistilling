backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

collections:
  - name: entries
    label: Entries
    folder: _entries
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: date, format: MMMM YYYY }
      - label: Type
        name: type
        widget: select
        options: [projects, thoughts, art, photo]
      - label: Subtypes
        name: subtypes
        widget: select
        multiple: true
        options: [Moving, Making, Fixing, Seeing, Recording, Experimenting, Stories, Wool, Leather, Wood, Stone, Air, Paint, Nature, Humans, Society, Building, Breaking, Work, Play, Heart, Mind, Landscape, People, Travel, Detail, Urban, Abstract]
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Main Image, name: image, widget: image, required: false }
      - label: Additional Images (for peepholes)
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - { label: YouTube URL, name: youtube, widget: string, required: false }
      - { label: "Order (Art wall position — 1 is first)", name: order, widget: number, required: false, value_type: float }

  - name: places
    label: Places
    folder: _places
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, required: false }
      - { label: Latitude, name: lat, widget: number, value_type: float }
      - { label: Longitude, name: lng, widget: number, value_type: float }
      - { label: Date, name: date, widget: string, required: false }
      - { label: Note, name: note, widget: text, required: false }
      - label: Pin Colour
        name: color
        widget: select
        required: false
        default: "#6aab8a"
        options: ["#6aab8a","#d4a830","#c0573a","#5b8fa0","#8a7ab0","#a8bfb0","#e8ede9"]
      - label: Pin Shape
        name: shape
        widget: select
        required: false
        default: circle
        options: [circle, diamond, star, cross]
      - { label: Related post title, name: postTitle, widget: string, required: false }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
